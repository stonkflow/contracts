name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build proto release artifact
        run: |
          tar -czf "proto-${GITHUB_REF_NAME}.tar.gz" proto
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            proto-${{ github.ref_name }}.tar.gz
