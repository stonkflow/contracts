syntax = "proto3";

package stonkflow;

option go_package = "github.com/stonkflow/contracts/gen;stonkflow";

message Item {
  string symbol = 1;
  string side = 2;
  double amount = 3;
}

enum DiffType {
  DIFF_TYPE_UNSPECIFIED = 0;
  DIFF_TYPE_ADDED = 1;
  DIFF_TYPE_REMOVED = 2;
  DIFF_TYPE_UPDATED = 3;
}

message ItemDiff {
  string symbol = 1;
  string side = 2;
  double previous_amount = 3;
  double current_amount = 4;
  double delta_amount = 5;
  DiffType type = 6;
}

message Diff {
  int64 previous_time = 1;
  int64 current_time = 2;
  repeated ItemDiff changes = 3;
}

message BalanceSnapshot {
  int64 time = 1;
  repeated Item items = 2;
  Diff diff = 3;
}
