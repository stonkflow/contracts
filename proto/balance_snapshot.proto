syntax = "proto3";

package stonkflow;

option go_package = "github.com/stonkflow/contracts/gen;stonkflow";

message BalanceSnapshot {
  string session_id = 1;
  string exchange = 2;
  string market = 3;
  string asset = 4;
  int64 available = 5;
  int64 locked = 6;
  int64 total = 7;
  int64 updated_at_unix = 8;
}
